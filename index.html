<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilmington and Beaches Content Marketing Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#F5EFE0;--sand-dark:#EDE4CE;--ocean:#1A4B6E;--ocean-mid:#2C6E9B;
  --ocean-light:#A8C8E0;--seafoam:#3D9E8C;--seafoam-light:#B2DED8;
  --coral:#D96B4F;--coral-light:#F2C4B8;--gold:#C9923A;--gold-light:#F0D9B5;
  --ink:#1C2B35;--ink-mid:#3D5260;--ink-light:#7A9BAD;--white:#FDFAF4;
  --radius:10px;--shadow:0 2px 16px rgba(26,75,110,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--sand);min-height:100vh}
.header{background:var(--ocean);padding:22px 36px 18px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.header h1{font-family:'DM Serif Display',serif;font-size:26px;color:var(--white);letter-spacing:-.3px}
.header p{font-size:12px;color:var(--ocean-light);margin-top:4px;font-weight:300}
.header-right{display:flex;align-items:center;gap:10px}
.filter-note{font-size:11px;color:var(--ocean-light);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 10px}
.period-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;cursor:pointer;outline:none}
.period-select option{background:var(--ocean)}
.loc-tabs{display:flex;padding:0 36px;background:var(--ocean);border-bottom:3px solid var(--sand-dark);overflow-x:auto}
.loc-tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--ocean-light);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .18s;white-space:nowrap;flex-shrink:0}
.loc-tab:hover{color:var(--white)}
.loc-tab.active{color:var(--white);border-bottom-color:var(--seafoam);font-weight:600}
.main{padding:28px 36px 80px}

/* Cards */
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
.scard{background:var(--white);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.scard-label{font-size:11px;font-weight:500;color:var(--ink-light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.scard-val{font-size:24px;font-weight:600;color:var(--ink);line-height:1}

/* Import bar */
.import-bar{background:var(--white);border:1.5px dashed var(--ocean-light);border-radius:var(--radius);padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.import-bar p{font-size:13px;color:var(--ink-mid);flex:1;min-width:200px}
.import-bar strong{color:var(--ocean)}
.step-pill{background:var(--sand);border:1px solid var(--sand-dark);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--ink-mid);display:inline-flex;align-items:center;gap:5px;margin:2px}
.step-num{background:var(--ocean);color:white;width:17px;height:17px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Platform sections */
.platform-section{margin-bottom:28px}
.platform-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1.5px solid var(--sand-dark)}
.platform-title{display:flex;align-items:center;gap:10px;font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink)}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'DM Sans',sans-serif;letter-spacing:.4px;text-transform:uppercase}
.badge-ig{background:var(--coral-light);color:var(--coral)}
.badge-fb{background:var(--ocean-light);color:var(--ocean)}
.badge-partner{background:var(--gold-light);color:var(--gold)}
.badge-milestone{background:#F0D9B5;color:#7A6030}
.badge-organic{font-size:11px;color:var(--seafoam);background:var(--seafoam-light);padding:3px 9px;border-radius:20px;font-family:'DM Sans',sans-serif;font-weight:500}

/* Tables */
.data-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;font-size:13px;margin-bottom:12px}
.data-table thead tr{background:var(--ink);color:var(--white)}
.data-table thead th{padding:11px 16px;text-align:left;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.data-table thead th.metric{color:var(--ocean-light)}
.data-table thead th.growth{color:var(--seafoam-light)}
.data-table thead th.divider{border-left:2px solid rgba(255,255,255,.15)}
.data-table tbody tr{border-bottom:1px solid var(--sand-dark);transition:background .12s}
.data-table tbody tr:last-child{border-bottom:none}
.data-table tbody tr:hover{background:var(--sand)}
.data-table td{padding:0}
.data-table td input{width:100%;padding:12px 16px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;text-align:right}
.data-table td input:focus{background:var(--gold-light)}
.data-table td.row-label{padding:12px 16px;font-weight:500;white-space:nowrap}
.data-table td.computed{padding:12px 16px;text-align:right;font-weight:600;white-space:nowrap}
.data-table td.divider{border-left:2px solid var(--sand-dark) !important}
.eng{color:var(--seafoam)}
.up{color:#2d8a4e}.down{color:var(--coral)}.flat{color:var(--ink-light)}
.totals-row td{background:var(--sand) !important;font-weight:700 !important}
.notes-row{display:flex;gap:10px;align-items:flex-start;margin-top:8px}
.notes-label{font-size:12px;color:var(--ink-light);padding-top:12px;white-space:nowrap}
.notes-row textarea{flex:1;padding:10px 14px;border:1px solid var(--sand-dark);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--white);resize:vertical;min-height:60px;outline:none}
.notes-row textarea:focus{border-color:var(--ocean-light)}
.divider-line{border:none;border-top:1.5px solid var(--sand-dark);margin:4px 0 24px}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;max-width:640px}
.chart-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;max-width:300px}
.chart-box h3{font-family:'DM Serif Display',serif;font-size:15px;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-box h3 span{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ink-light);font-weight:400}
.mini-chart{display:flex;align-items:flex-end;gap:12px;height:80px;width:120px}
.bar-group{display:flex;gap:3px;align-items:flex-end;width:48px;flex-shrink:0}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:height .4s cubic-bezier(.4,0,.2,1);position:relative;cursor:pointer}
.bar:hover::after{content:attr(data-tip);position:absolute;bottom:105%;left:50%;transform:translateX(-50%);background:var(--ink);color:white;font-size:11px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:10}
.bar.ig-prev{background:var(--coral)}.bar.ig-curr{background:var(--coral);opacity:.55}
.bar.fb-prev{background:var(--ocean-mid)}.bar.fb-curr{background:var(--ocean-mid);opacity:.55}
.bar.ige-prev{background:var(--seafoam)}.bar.ige-curr{background:var(--seafoam);opacity:.55}
.bar.fbe-prev{background:var(--gold)}.bar.fbe-curr{background:var(--gold);opacity:.55}
.chart-labels{display:flex;gap:12px;margin-top:6px;width:120px}
.chart-label{width:48px;flex-shrink:0;text-align:center;font-size:10px;color:var(--ink-light)}
.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-mid)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* Top posts */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px}
.post-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.post-rank-bar{background:var(--ocean);color:white;font-size:10px;font-weight:700;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;letter-spacing:.5px;text-transform:uppercase}
.eng-badge{background:var(--seafoam);color:white;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.post-body{padding:12px 14px;flex:1}
.post-caption{font-size:12px;color:var(--ink);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.post-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--ink-light);margin-bottom:10px}
.post-stats{display:flex;gap:8px}
.stat-box{flex:1;background:var(--sand);border-radius:6px;padding:6px 8px;text-align:center}
.stat-val{font-size:14px;font-weight:600;color:var(--ink)}
.stat-lbl{font-size:10px;color:var(--ink-light);text-transform:uppercase;letter-spacing:.4px}
.post-link{display:block;padding:8px 14px;background:var(--sand);font-size:12px;color:var(--ocean-mid);text-decoration:none;border-top:1px solid var(--sand-dark);font-weight:500}
.post-link:hover{background:var(--sand-dark)}

/* Milestones */
.milestone-item{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border-left:4px solid var(--gold)}
.milestone-item.m500k{border-left-color:#9B4DCA}
.milestone-item.m750k{border-left-color:#D4418E}
.milestone-item.m1m{border-left-color:#E8372A}
.milestone-item.m50k{border-left-color:var(--seafoam)}
.milestone-item.m25k{border-left-color:var(--ink-light)}
.m-badge{flex-shrink:0;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:700;background:var(--gold-light);color:var(--gold);white-space:nowrap;display:inline-block}
.milestone-item.m500k .m-badge{background:#F0E0FF;color:#9B4DCA}
.milestone-item.m750k .m-badge{background:#FFE0F2;color:#D4418E}
.milestone-item.m1m .m-badge{background:#FFE0DE;color:#E8372A}
.milestone-item.m50k .m-badge{background:var(--seafoam-light);color:#2A6E5E}
.milestone-item.m25k .m-badge{background:#D4E8F0;color:#2C5B70}
.m-link{font-size:12px;color:var(--ocean-mid);text-decoration:none;font-weight:500}
.m-link:hover{text-decoration:underline}

/* AC tab */
.ac-section-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);margin-bottom:14px;padding-bottom:10px;border-bottom:1.5px solid var(--sand-dark);display:flex;align-items:center;gap:10px}
.ac-campaign-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;font-size:13px;margin-bottom:12px}
.ac-campaign-table thead tr{background:var(--ink);color:var(--white)}
.ac-campaign-table thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ac-campaign-table thead th.metric{color:var(--ocean-light)}
.ac-campaign-table tbody tr{border-bottom:1px solid var(--sand-dark)}
.ac-campaign-table tbody tr:last-child{border-bottom:none}
.ac-campaign-table tbody tr:hover{background:var(--sand)}
.ac-campaign-table td{padding:10px 14px;font-size:13px;vertical-align:middle}
.ac-campaign-table td.name{font-weight:500;color:var(--ink);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-campaign-table td.metric{text-align:right}
.good{color:#2d8a4e;font-weight:600;text-align:right}
.warn{color:var(--gold);font-weight:600;text-align:right}
.bad{color:var(--coral);font-weight:600;text-align:right}
.ac-auto-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.ac-auto-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;border-left:3px solid var(--ocean-mid)}
.ac-auto-card-name{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-stat{font-size:22px;font-weight:600;color:var(--ink);line-height:1}
.ac-stat-lbl{font-size:11px;color:var(--ink-light);margin-top:3px}

/* Export strip */
.export-strip{position:fixed;bottom:0;left:0;right:0;background:var(--ink);padding:10px 36px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.export-strip p{font-size:12px;color:var(--ink-light)}
.export-btns{display:flex;gap:8px}
.export-btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:opacity .15s}
.export-btn:hover{opacity:.85}
.export-btn.primary{background:var(--seafoam);color:white}
.export-btn.secondary{background:rgba(255,255,255,.12);color:var(--white)}
</style>
</head>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function n(v){ return parseFloat(v)||0; }
function fmt(v){
  if(v===''||v===null||v===undefined) return '--';
  v=parseFloat(v)||0;
  if(v>=1000000) return (v/1000000).toFixed(1)+'M';
  if(v>=1000) return (v/1000).toFixed(1)+'K';
  return Math.round(v).toLocaleString();
}
function pct(v){ return (!v&&v!==0)||isNaN(v)||!isFinite(v)?'--':(+v).toFixed(2)+'%'; }
function engCalc(views,ints){ var v=n(views),i=n(ints); return v>0?pct(i/v*100):'--'; }
function delta(curr,prev){
  var c=n(curr),p=n(prev);
  if(!p&&!c) return {cls:'flat',txt:'--'};
  if(!p) return {cls:'up',txt:'New'};
  var d=(c-p)/p*100;
  if(Math.abs(d)<0.05) return {cls:'flat',txt:'0.0%'};
  return {cls:d>0?'up':'down', txt:(d>0?'+':'-')+Math.abs(d).toFixed(1)+'%'};
}
function milestoneInfo(views,loc){
  var isBeach = loc && loc !== 'Wilmington';
  if(views>=1000000) return {label:'Trophy 1M+',cls:'m1m'};
  if(views>=750000)  return {label:'750K+',cls:'m750k'};
  if(views>=500000)  return {label:'500K+',cls:'m500k'};
  if(views>=100000)  return {label:'100K+',cls:'m100k'};
  if(isBeach&&views>=50000) return {label:'50K+',cls:'m50k'};
  if(isBeach&&views>=25000) return {label:'25K+',cls:'m25k'};
  return null;
}
function setEl(id,val){ var e=document.getElementById(id); if(e) e.textContent=val; }
function setClass(id,cls){ var e=document.getElementById(id); if(e) e.className='computed '+cls; }
function setDelta(id,d){ setEl(id,d.txt); setClass(id,d.cls); }
function setBar(id,val,max,tip){
  var e=document.getElementById(id);
  if(e){ e.style.height=Math.max(Math.round(val/max*76),2)+'px'; e.setAttribute('data-tip',tip||fmt(val)); }
}

// ── RECOMPUTE ─────────────────────────────────────────────────────────────────
function recompute(){
  var loc=LOCS[currentLoc];
  var d=store[loc];

  // IG computed
  setEl('ig-eng', engCalc(d.ig.views,d.ig.interactions)); setClass('ig-eng','computed eng divider');
  setEl('ig-prev-eng', engCalc(d.ig.prev_views,d.ig.prev_interactions)); setClass('ig-prev-eng','computed divider');
  setDelta('ig-vg', delta(d.ig.views,d.ig.prev_views));
  setDelta('ig-ig', delta(d.ig.interactions,d.ig.prev_interactions));
  setDelta('ig-fg', delta(d.ig.follows,d.ig.prev_follows));

  // FB computed
  setEl('fb-eng', engCalc(d.fb.viewers,d.fb.interactions)); setClass('fb-eng','computed eng divider');
  setEl('fb-prev-eng', engCalc(d.fb.prev_viewers,d.fb.prev_interactions)); setClass('fb-prev-eng','computed divider');
  setDelta('fb-vg', delta(d.fb.viewers,d.fb.prev_viewers));
  setDelta('fb-ig', delta(d.fb.interactions,d.fb.prev_interactions));
  setDelta('fb-fg', delta(d.fb.follows,d.fb.prev_follows));

  // Summary cards
  var pV=loc==='Wilmington'?partners.reduce(function(s,p){return s+(p.views||0);},0):0;
  var pI=loc==='Wilmington'?partners.reduce(function(s,p){return s+(p.interactions||0);},0):0;
  var tV=n(d.ig.views)+n(d.fb.viewers)+pV;
  var tI=n(d.ig.interactions)+n(d.fb.interactions)+pI;
  var tF=n(d.ig.follows)+n(d.fb.follows);
  var tTF=n(d.ig.total_followers)+n(d.fb.total_followers);
  var fd=delta(tF,n(d.ig.prev_follows)+n(d.fb.prev_follows));

  setEl('sum-views', fmt(tV)||'--');
  setEl('sum-int', fmt(tI)||'--');
  setEl('sum-fol', fmt(tF)||'--');
  setEl('sum-total-fol', tTF>0?fmt(tTF):'--');
  setEl('sum-eng', tV>0?pct(tI/tV*100):'--');

  // Charts
  var igV=n(d.ig.views),fbV=n(d.fb.viewers),igPV=n(d.ig.prev_views),fbPV=n(d.fb.prev_viewers);
  var igE=igV>0?n(d.ig.interactions)/igV*100:0;
  var fbE=fbV>0?n(d.fb.interactions)/fbV*100:0;
  var igPE=igPV>0?n(d.ig.prev_interactions)/igPV*100:0;
  var fbPE=fbPV>0?n(d.fb.prev_interactions)/fbPV*100:0;
  var maxV=Math.max(igV,fbV,igPV,fbPV,1);
  var maxE=Math.max(igE,fbE,igPE,fbPE,1);
  setBar('bIgPrev',igPV,maxV,fmt(igPV)); setBar('bIgCurr',igV,maxV,fmt(igV));
  setBar('bFbPrev',fbPV,maxV,fmt(fbPV)); setBar('bFbCurr',fbV,maxV,fmt(fbV));
  setBar('bIgEP',igPE,maxE,igPE.toFixed(1)+'%'); setBar('bIgEC',igE,maxE,igE.toFixed(1)+'%');
  setBar('bFbEP',fbPE,maxE,fbPE.toFixed(1)+'%'); setBar('bFbEC',fbE,maxE,fbE.toFixed(1)+'%');
}

function recomputePartner(){
  var totV=0,totI=0,totF=0;
  partners.forEach(function(p,i){
    setEl('pt-eng-'+i, engCalc(p.views,p.interactions)); setClass('pt-eng-'+i,'computed eng divider');
    totV+=p.views||0; totI+=p.interactions||0;
    totF+=parseFloat(p.total_followers)||0;
  });
  setEl('pt-tv',fmt(totV)); setEl('pt-ti',fmt(totI));
  setEl('pt-tf', totF>0?fmt(totF):'--');
  setEl('pt-te',engCalc(totV,totI)); setClass('pt-te','computed eng divider');
  recompute();
}

function buildMilestones(loc){
  var isBeach=loc!=='Wilmington';
  var threshold=isBeach?25000:100000;
  var threshLabel=isBeach?'25K+ Views':'100K+ Views';
  var posts=milestones[loc]||[];
  if(isBeach){
    var extra=[];
    (topPosts[loc]||[]).forEach(function(p){ if(p.views>=threshold) extra.push({month:'Apr 2026',views:p.views,platform:p.platform,account:p.type,url:p.url}); });
    var all=extra.concat(posts);
    var seen={};
    posts=all.filter(function(m){ if(seen[m.views]) return false; seen[m.views]=true; return true; });
    posts.sort(function(a,b){return b.views-a.views;});

    var vf=m.views>=1000000?(m.views/1000000).toFixed(2)+'M':(m.views/1000).toFixed(1)+'K';

function showACView(view){
  var ov = document.getElementById('ac-overview-content');
  var tr = document.getElementById('ac-trends-content');
  var tabOv = document.getElementById('ac-tab-overview');
  var tabTr = document.getElementById('ac-tab-trends');
  if(!ov||!tr) return;
  if(view==='trends'){
    ov.style.display='none';
    tr.style.display='block';
    tr.innerHTML = buildACTrends();
    tabOv.style.background='none'; tabOv.style.color='var(--ink-mid)'; tabOv.style.fontWeight='500';
    tabTr.style.background='var(--ocean)'; tabTr.style.color='var(--white)'; tabTr.style.fontWeight='600';

    ov.style.display='block';
    tr.style.display='none';

    tabTr.style.background='none'; tabTr.style.color='var(--ink-mid)'; tabTr.style.fontWeight='500';
  }
}

function updateTTComparison(){
  function n(id){ return parseFloat(document.getElementById(id)&&document.getElementById(id).value)||0; }
  function pctChange(curr,prev){ if(!prev) return null; return ((curr-prev)/prev*100); }
  var cv=n('tt-curr-views'),pv=n('tt-prev-views');
  var cf=n('tt-curr-fol'),pf=n('tt-prev-fol');
  var row=document.getElementById('tt-comparison-row');
  if(!row) return;
  var parts=[];
  if(pv){
    var vd=pctChange(cv,pv);
    var vColor=vd>=0?'#2d8a4e':'var(--coral)';
    parts.push('<span>Video Views: <strong style="color:'+vColor+'">'+(vd>=0?'+':'')+vd.toFixed(1)+'%</strong> vs Mar</span>');
  }
  if(pf){
    var fd=pctChange(cf,pf);
    var fColor=fd>=0?'#2d8a4e':'var(--coral)';
    parts.push('<span>Net Follows: <strong style="color:'+fColor+'">'+(fd>=0?'+':'')+fd.toFixed(1)+'%</strong> vs Mar</span>');
  }
  row.innerHTML=parts.length?parts.join('<span style="color:var(--sand-dark);margin:0 4px">|</span>'):'Enter March numbers above to see month-over-month comparison.';
}

function updateLIComparison(){
  function n(id){ return parseFloat(document.getElementById(id)&&document.getElementById(id).value)||0; }
  var ci=n('li-curr-imp'), pi=n('li-prev-imp');
  var cf=n('li-curr-fol'), pf=n('li-prev-fol');
  var row=document.getElementById('li-comparison-row');
  if(!row) return;
  var parts=[];
  if(pi){
    var id=((ci-pi)/pi*100);
    parts.push('<span>Impressions: <strong style="color:'+(id>=0?'#2d8a4e':'var(--coral)')+'">'+(id>=0?'+':'')+id.toFixed(1)+'%</strong> vs prior month</span>');
  }
  if(pf){
    var fd=((cf-pf)/pf*100);
    parts.push('<span>New Followers: <strong style="color:'+(fd>=0?'#2d8a4e':'var(--coral)')+'">'+(fd>=0?'+':'')+fd.toFixed(1)+'%</strong> vs prior month</span>');
  }
  row.innerHTML=parts.length?parts.join('<span style="color:var(--sand-dark);margin:0 8px">|</span>'):'Enter March numbers above to see month-over-month comparison.';
}

function switchTab(idx,btn){

    document.getElementById('main').innerHTML=buildSocialPage();
  }

    ]
  };

  var locInsights = insights[loc] || insights['Wilmington'];
  // Strip (Meta) suffix for lookup
  var cleanLoc = loc.replace(' (Meta)','');
  locInsights = insights[cleanLoc] || insights['Wilmington'];

  if(!locInsights) return '';

  var s = '<div style="background:var(--ocean);border-radius:var(--radius);padding:20px 24px;margin-top:8px;margin-bottom:24px">';
  s += '<div style="font-size:14px;font-weight:600;color:var(--white);margin-bottom:12px">&#128161; Key Insights &mdash; '+cleanLoc+' (Apr 2026)</div>';
  locInsights.forEach(function(insight,i){
    s += '<div style="display:flex;gap:10px;margin-bottom:'+(i<locInsights.length-1?'10px':'0')+'">';
    s += '<span style="color:var(--seafoam);font-weight:700;flex-shrink:0">'+(i+1)+'.</span>';
    s += '<span style="font-size:13px;color:var(--ocean-light);line-height:1.5">'+insight+'</span>';
    s += '</div>';
  });
  s += '</div>';
  return s;
}


function renderDestContent(){
  var destEl=document.getElementById('dest-content');
  if(!destEl) return;
  // TikTok is its own view
  if(currentDestLoc===4){
    destEl.innerHTML=buildTikTokPage();
    return;
  }
  if(currentDestLoc===5){
    destEl.innerHTML=buildLinkedInPage();
    return;
  }
  // Build the platform sections directly into dest-content
  var loc=LOCS[currentDestLoc];
  var d=store[loc];
  var s='';
  s+='<div class="import-bar"><p><strong>How to use:</strong> Enter data below or share your Meta Business Suite screen with Claude.</p><div>';
  s+='<span class="step-pill"><span class="step-num">1</span>Filter: Organic only</span>';
  s+='<span class="step-pill"><span class="step-num">2</span>Exclude Stories</span>';
  s+='<span class="step-pill"><span class="step-num">3</span>Share screen with Claude</span>';
  s+='</div></div>';
  s+='<div class="summary-row">';
  s+='<div class="scard"><div class="scard-label">Total Views / Viewers</div><div class="scard-val" id="sum-views">--</div></div>';
  s+='<div class="scard"><div class="scard-label">Total Interactions</div><div class="scard-val" id="sum-int">--</div></div>';
  s+='<div class="scard"><div class="scard-label">Follows from Posts</div><div class="scard-val" id="sum-fol">--</div></div>';
  s+='<div class="scard"><div class="scard-label">Total Followers (IG+FB)</div><div class="scard-val" id="sum-total-fol">--</div></div>';
  s+='<div class="scard"><div class="scard-label">Overall Engagement Rate</div><div class="scard-val" id="sum-eng">--</div></div>';
  s+='</div>';
  s+=buildPlatSection('ig',d);
  s+=buildPlatSection('fb',d);
  if(loc==='Wilmington') s+=buildPartnerSection();
  s+=buildCharts();
  s+=buildTopPosts(loc);
  s+=buildMilestones(loc);
  s += buildMetaInsights(loc);
  destEl.innerHTML=s;
  // Wire inputs
  ['ig','fb'].forEach(function(plt){
    var isFB=plt==='fb';
    var map=[
      [plt+'-view-input',  isFB?'viewers':'views'],
      [plt+'-int-input',   'interactions'],
      [plt+'-fol-input',   'follows'],
      [plt+'-tfol-input',  'total_followers'],
      [plt+'-pview-input', isFB?'prev_viewers':'prev_views'],
      [plt+'-pint-input',  'prev_interactions'],
      [plt+'-pfol-input',  'prev_follows']
    ];
    map.forEach(function(pair){
      var el=document.getElementById(pair[0]);
      if(!el) return;
      el.addEventListener('input',function(){ store[LOCS[currentLoc]][plt][pair[1]]=this.value; recompute(); });
    });
    var ne=document.getElementById(plt+'-notes');
    if(ne) ne.addEventListener('input',function(){ store[LOCS[currentLoc]][plt].notes=this.value; });
  });
  recompute();
  if(loc==='Wilmington') recomputePartner();
}

function updateLabel(){
  var v=document.getElementById('period-sel').value;
  document.getElementById('export-lbl').textContent='Coastal Marketing - '+v+' - Organic feed posts only';
}

function clearTab(){
  if(currentLoc===4) return;
  var loc=LOCS[currentLoc];
  store[loc]={
    ig:{views:'',interactions:'',follows:'',total_followers:'',prev_views:'',prev_interactions:'',prev_follows:'',notes:''},
    fb:{viewers:'',interactions:'',follows:'',total_followers:'',prev_viewers:'',prev_interactions:'',prev_follows:'',notes:''}
  };
  renderDestContent();
}

function exportCSV(){
  var csv='Location,Platform,Period,Views/Viewers,Interactions,Follows,Eng Rate,Views Growth,Int Growth,Follows Growth\n';
  LOCS.forEach(function(loc){
    ['ig','fb'].forEach(function(plt){
      var d=store[loc][plt];
      var isFB=plt==='fb';
      var v=isFB?(d.viewers||0):(d.views||0);
      var pv=isFB?(d.prev_viewers||0):(d.prev_views||0);
      var eng=n(v)>0?((n(d.interactions)/n(v))*100).toFixed(2)+'%':'--';
      var vd=delta(v,pv),id2=delta(d.interactions,d.prev_interactions),fd=delta(d.follows,d.prev_follows);
      csv+='"'+loc+'","'+plt.toUpperCase()+'","This month",'+( v||0)+','+(d.interactions||0)+','+(d.follows||0)+',"'+eng+'","'+vd.txt+'","'+id2.txt+'","'+fd.txt+'"\n';
    });
  });
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='coastal-marketing-report.csv';
  a.click();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildPage();
</script>
